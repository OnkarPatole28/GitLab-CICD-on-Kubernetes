workflow:
    name: Solar System NodeJS Pipeline
    # WE CAN ALSO DEFINE RULES AT WORKFLOW LEVEL (WILL WORK ON IT LATER)

variables:
  MONGO_URI: $MONGO_URI
  MONGO_USERNAME: $MONGO_USERNAME 
  MONGO_PASSWORD: $MONGO_PASSWORD
  IMAGE_VERSION: $CI_PIPELINE_ID
  DOCKER_USERNAME: $MY_DOCKER_USERNAME
  DOCKER_PASSWORD: $MY_DOCKER_PASSWORD
  DOCKER_REGISTRY: $MY_DOCKER_REGISTRY
  GITLAB_PUSH_TOKEN: $GITLAB_PUSH_TOKEN
  APP_URL: $APP_URL
  
stages: # WE DEFINE STAGES T0 LOGICALLY GROUP THE JOBS. JOBS DEFINED IN SAME STAGE RUNS IN PARALLEL UNLESS USED NEEDS KEYWORD 
  - test
  - containerization
  - deploy

unit_testing:
  stage: test
  image: node:20-alpine3.19
  before_script:
    - npm install
  script:
    - npm test
  cache:    # WE USE CACHE KEYWORD SO THAT DEPENDENCIES INSTALLED IN ONE JOB CAN BE USED IN OTHER JOBS WITHOUT THEM DOWNLOADING AGAIN
    policy: pull-push
    key:
        files:
          - package-lock.json
        prefix: node-modules
    paths:
      - node_modules
  artifacts:           # WE STORE THE ARTIFACTS, SO THAT THEY CAN BE USED IN DIFFERENT JOBS SINCE JOBS MIGHT RUN ON DIFFERENT MACHINES.
    name: Mocha-Test-Result
    when: on_success
    paths:
      - test-results.xml
    expire_in: 5 days 

code_coverage:
  stage: test
  image: node:17-alpine3.14
  before_script:
    - npm install
  cache:
    policy: pull
    key:
        files:
          - package-lock.json
        prefix: node-modules
    paths:
      - node_modules
  script: |
    npm run coverage
  artifacts:
    name: Code-Coverage-Result
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  allow_failure: true # IF WE SET THIS PARAMETER THEN EVEN IF THE JOB FAILS, PIPELINE WILL NOT FAIL

docker_build:
  stage: containerization
  image: docker:24.0.5
  dependencies: [] 
  services:
    - docker:24.0.5-dind  # SINCE WE ARE RUNNING DOCKER COMMAND IN DOCKER (BECAUSE WE ARE USING DOCKER AS OUR EXECUTER IN THIS CASE) WE USE THIS SERVICE
  script:
    - docker build -t $DOCKER_USERNAME/solar-system-gitlab:$IMAGE_VERSION .
    - docker images $DOCKER_USERNAME/solar-system-gitlab:$IMAGE_VERSION
    - mkdir image
    - docker save $DOCKER_USERNAME/solar-system-gitlab:$IMAGE_VERSION > image/solar-system-gitlab-image:$IMAGE_VERSION.tar
  artifacts:
    when: on_success
    paths:
      - image
    expire_in: 3 days   

docker_test:
  stage: containerization
  image: docker:24.0.5
  needs:
    - docker_build             
  services:
    - docker:24.0.5-dind
  script:
    - docker load -i image/solar-system-gitlab-image:$IMAGE_VERSION.tar
    - docker run --name solar-system-app -d -p 3000:3000 -e MONGO_URI="$MONGO_URI" -e MONGO_USERNAME="$MONGO_USERNAME" -e MONGO_PASSWORD="$MONGO_PASSWORD" $DOCKER_USERNAME/solar-system-gitlab:$IMAGE_VERSION
    - export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)
    - echo $IP
    - docker run alpine wget -q -O - http://$IP:3000/live | grep live

docker_push:
  stage: containerization
  needs:
    - docker_build 
    - docker_test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker load -i image/solar-system-gitlab-image:$IMAGE_VERSION.tar
    - docker login --username=$DOCKER_USERNAME --password=$DOCKER_PASSWORD
    - docker push $DOCKER_USERNAME/solar-system-gitlab:$IMAGE_VERSION

k8s_update_manifest:
  stage: deploy
  needs:
    - docker_push
  image: alpine:3.19
  before_script:
    - apk add --no-cache git sed
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@example.com"
  script:
    - 'sed -i "s|image: .*|image: $DOCKER_USERNAME/solar-system-gitlab:$IMAGE_VERSION|g" kubernetes/deployment.yaml'
    - git add kubernetes/deployment.yaml
    - git commit -m "Update image to $IMAGE_VERSION [skip ci]" || echo "No changes to commit"
    - git push https://oauth2:$GITLAB_PUSH_TOKEN@gitlab.com/devops-projects1972810/GitLab-CICD-on-Kubernetes.git HEAD:$CI_COMMIT_BRANCH

k8s_integration_testing:
  stage: deploy
  needs:
    - k8s_update_manifest
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl jq
  script:
    # wait for ArgoCD to deploy the new version
    - echo "Waiting for argo cd to complete application rollout..."
    - sleep 120

    # health checks
    - curl -s http://$APP_URL/live | jq -r .status | grep -i live
    - curl -s http://$APP_URL/ready | jq -r .status | grep -i ready
